<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Password Reset</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
    <p>Hi {{ username|default:user.username }},</p>
    
    <p>We've received a request to reset your password.</p>
    
    <p style="margin: 30px 0;">
        <a href="{{ password_reset_url }}" style="background-color: #007bff; color: white; padding: 12px 24px; text-decoration: none; border-radius: 5px; display: inline-block; font-weight: bold;">Reset Password</a>
    </p>
    
    <p>If you ignore this message, your password will not be changed. If you didn't request a password reset, let us know.</p>
</body>
</html>
